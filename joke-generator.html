<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1rem;
        }

        .joke-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 40px;
            margin: 30px 0;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
            line-height: 1.8;
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .joke-box:hover {
            transform: scale(1.02);
        }

        .joke-box.loading {
            background: linear-gradient(135deg, #a8c5da 0%, #8b9ba8 100%);
            font-size: 1.1rem;
            color: #fff;
        }

        .joke-setup {
            margin-bottom: 15px;
            font-style: italic;
            opacity: 0.9;
        }

        .joke-delivery {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        button {
            padding: 15px 40px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2);
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
            transform: translateY(-3px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .category-selector {
            margin: 30px 0;
        }

        .category-selector label {
            color: #333;
            font-weight: 600;
            margin-right: 15px;
            display: inline-block;
        }

        .category-selector select {
            padding: 10px 20px;
            border-radius: 8px;
            border: 2px solid #667eea;
            font-size: 1rem;
            cursor: pointer;
            color: #333;
            background: white;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .success {
            background: #51cf66;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .joke-counter {
            color: #999;
            font-size: 0.9rem;
            margin-top: 20px;
        }

        .emoji {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 20px;
            }

            h1 {
                font-size: 2rem;
            }

            .joke-box {
                padding: 30px 20px;
                font-size: 1.1rem;
            }

            button {
                padding: 12px 30px;
                font-size: 0.9rem;
            }

            .buttons {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">😂</div>
        <h1>Joke Generator</h1>
        <p class="subtitle">Laugh out loud with random jokes!</p>

        <div class="category-selector">
            <label for="category">Select Category:</label>
            <select id="category">
                <option value="Any">Any</option>
                <option value="General">General</option>
                <option value="Knock-knock">Knock-knock</option>
                <option value="Programming">Programming</option>
            </select>
        </div>

        <div id="joke-box" class="joke-box">
            Click "Get Joke" to start laughing! 🎉
        </div>

        <div id="message"></div>

        <div class="buttons">
            <button class="btn-primary" id="get-joke-btn" onclick="getJoke()">Get Joke</button>
            <button class="btn-secondary" id="copy-btn" onclick="copyToClipboard()">Copy Joke</button>
        </div>

        <div class="joke-counter">
            <p id="counter">Jokes fetched: 0</p>
        </div>
    </div>

    <script>
        let jokeCount = 0;
        let currentJoke = '';

        // Get category from dropdown
        function getSelectedCategory() {
            const categorySelect = document.getElementById('category');
            return categorySelect.value;
        }

        // Fetch joke from API
        async function getJoke() {
            const jokeBox = document.getElementById('joke-box');
            const messageBox = document.getElementById('message');
            const btn = document.getElementById('get-joke-btn');
            const category = getSelectedCategory();

            // Reset message
            messageBox.innerHTML = '';

            // Show loading state
            jokeBox.classList.add('loading');
            jokeBox.innerHTML = '⏳ Loading joke...';
            btn.disabled = true;

            try {
                // Using JokeAPI with selected category
                const url = category === 'Any' 
                    ? 'https://v2.jokeapi.dev/joke/Any'
                    : `https://v2.jokeapi.dev/joke/${category}`;

                const response = await fetch(url);
                const data = await response.json();

                jokeBox.classList.remove('loading');

                if (data.error) {
                    jokeBox.innerHTML = '❌ Could not fetch joke. Please try again!';
                    messageBox.innerHTML = '<div class="error">Error: ' + data.message + '</div>';
                } else {
                    // Check if it's a two-part joke or single joke
                    if (data.type === 'twopart') {
                        currentJoke = `${data.setup}\n\n${data.delivery}`;
                        jokeBox.innerHTML = `
                            <div>
                                <div class="joke-setup">${data.setup}</div>
                                <div class="joke-delivery">${data.delivery}</div>
                            </div>
                        `;
                    } else {
                        currentJoke = data.joke;
                        jokeBox.innerHTML = `<div>${data.joke}</div>`;
                    }

                    jokeCount++;
                    document.getElementById('counter').textContent = `Jokes fetched: ${jokeCount}`;
                    messageBox.innerHTML = '<div class="success">✓ Here\'s your joke!</div>';
                }
            } catch (error) {
                jokeBox.classList.remove('loading');
                jokeBox.innerHTML = '❌ Oops! Something went wrong. Please check your internet connection and try again.';
                messageBox.innerHTML = '<div class="error">Error: ' + error.message + '</div>';
                console.error('Error fetching joke:', error);
            } finally {
                btn.disabled = false;
            }
        }

        // Copy joke to clipboard
        function copyToClipboard() {
            if (!currentJoke) {
                alert('No joke to copy! Get a joke first.');
                return;
            }

            navigator.clipboard.writeText(currentJoke).then(() => {
                const messageBox = document.getElementById('message');
                messageBox.innerHTML = '<div class="success">✓ Joke copied to clipboard!</div>';
                setTimeout(() => {
                    messageBox.innerHTML = '';
                }, 3000);
            }).catch(err => {
                alert('Failed to copy joke: ' + err);
            });
        }

        // Load a joke when page loads
        window.addEventListener('load', () => {
            getJoke();
        });

        // Keyboard shortcut: Press 'Enter' to get a new joke
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                getJoke();
            }
        });
    </script>
</body>
</html>
